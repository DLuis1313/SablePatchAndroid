name: Build Sable Android Patch 2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # permite rodar manualmente pelo site do GitHub

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Compila o libsable_rapier.so para Android ARM64
  # ──────────────────────────────────────────────────────────────
  build-native:
    name: Build sable_rapier (aarch64-android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout este repositório
        uses: actions/checkout@v4

      - name: Instalar Rust + target Android ARM64
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Instalar Android NDK
        uses: android-actions/setup-android@v3

      - name: Configurar NDK toolchain para Rust
        run: |
          # Exporta variáveis do NDK para o cargo
          NDK_HOME="${ANDROID_SDK_ROOT}/ndk/$(ls ${ANDROID_SDK_ROOT}/ndk | tail -1)"
          echo "NDK_HOME=${NDK_HOME}" >> $GITHUB_ENV
          TOOLCHAIN="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          echo "AR=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${TOOLCHAIN}/bin/aarch64-linux-android24-clang++" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${TOOLCHAIN}/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "RUSTFLAGS=-C panic=abort" >> $GITHUB_ENV

      - name: Clonar o crate sable_rapier (Sable 2.0.x)
        run: |
          # Clone apenas o crate de física do Sable
          # Ajuste a URL/tag conforme o repositório real do Sable 2.0.x
          git clone --depth 1 --branch 2.0.0 \
            https://github.com/sable-mod/sable_rapier.git \
            sable_rapier_src || \
          # Fallback: tenta o repositório principal e extrai o crate
          git clone --depth 1 \
            https://codeberg.org/sable-mod/sable_rapier.git \
            sable_rapier_src
          echo "Crate clonado."
          ls sable_rapier_src/

      - name: Compilar libsable_rapier.so para ARM64 Android
        working-directory: sable_rapier_src
        run: |
          cargo build \
            --release \
            --target aarch64-linux-android \
            --lib
          ls -la target/aarch64-linux-android/release/

      - name: Copiar .so para resources do mod
        run: |
          mkdir -p src/main/resources/natives/android/arm64-v8a/
          cp sable_rapier_src/target/aarch64-linux-android/release/libsable_rapier.so \
             src/main/resources/natives/android/arm64-v8a/libsable_rapier.so
          echo "Copiado:"
          ls -la src/main/resources/natives/android/arm64-v8a/

      - name: Upload do .so como artefato intermediário
        uses: actions/upload-artifact@v4
        with:
          name: libsable_rapier_arm64
          path: src/main/resources/natives/android/arm64-v8a/libsable_rapier.so
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Compila o mod Java/NeoForge com o .so incluído
  # ──────────────────────────────────────────────────────────────
  build-mod:
    name: Build Mod JAR (NeoForge 1.21.1)
    runs-on: ubuntu-latest
    needs: build-native  # aguarda o job acima terminar

    steps:
      - name: Checkout este repositório
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Baixar .so compilado do job anterior
        uses: actions/download-artifact@v4
        with:
          name: libsable_rapier_arm64
          path: src/main/resources/natives/android/arm64-v8a/

      - name: Baixar Sable 2.0.x para compilação (compileOnly)
        run: |
          mkdir -p libs
          # Tenta baixar o Sable do Modrinth (API pública)
          curl -sL "https://api.modrinth.com/v2/project/sable/version?game_versions=[\"1.21.1\"]&loaders=[\"neoforge\"]" \
            -o sable_versions.json
          DOWNLOAD_URL=$(python3 -c "
          import json, sys
          data = json.load(open('sable_versions.json'))
          for v in data:
              if v['version_number'].startswith('2.0'):
                  for f in v['files']:
                      if f['primary']:
                          print(f['url'])
                          sys.exit(0)
          print('NOT_FOUND')
          ")
          echo "URL do Sable: ${DOWNLOAD_URL}"
          if [ "${DOWNLOAD_URL}" != "NOT_FOUND" ]; then
            curl -L "${DOWNLOAD_URL}" -o libs/sable.jar
            echo "Sable baixado com sucesso."
          else
            echo "AVISO: Sable 2.0.x não encontrado no Modrinth para 1.21.1."
            echo "Crie um arquivo libs/sable.jar vazio como placeholder."
            echo "O mod ainda compilará, mas os Mixins não serão verificados."
            touch libs/sable.jar
          fi

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Tornar gradlew executável
        run: chmod +x gradlew

      - name: Compilar o mod
        run: ./gradlew build --no-daemon --stacktrace

      - name: Verificar JAR gerado
        run: |
          echo "=== JAR gerado ==="
          ls -lah build/libs/*.jar
          echo ""
          echo "=== Conteúdo do JAR ==="
          unzip -l build/libs/*-sources.jar 2>/dev/null || true
          # Verifica se o .so está dentro do JAR final
          echo "=== Verificando nativo dentro do JAR ==="
          unzip -l build/libs/sableandroidpatch2-*.jar | grep "\.so" || \
            echo "AVISO: .so não encontrado no JAR – verifique a configuração do build.gradle"

      - name: Upload do mod como artefato do GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-patch-2-mod
          path: build/libs/sableandroidpatch2-*.jar
          # Exclui o -sources jar do upload principal
          if-no-files-found: error
          retention-days: 30

      - name: Upload de todos os JARs (incluindo sources/dev)
        uses: actions/upload-artifact@v4
        with:
          name: sable-android-patch-2-all-jars
          path: build/libs/
          retention-days: 14
          
